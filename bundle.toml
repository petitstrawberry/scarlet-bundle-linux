# Scarlet Linux ABI Bundle
# Pre-built Buildroot rootfs for Linux ABI compatibility.
# Uses {arch} template to select the correct architecture tree.

[[layers]]
kind = "copy"
source = "rootfs/system/linux-{arch}"
to = "/system/linux-{arch}"
template = true

[[layers]]
kind = "copy"
source = "rootfs/data/config/linux-{arch}"
to = "/data/config/linux-{arch}"
template = true

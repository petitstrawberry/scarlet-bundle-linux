name: Build release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build rootfs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        arch:
          - riscv64
          - aarch64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate checked-in Buildroot source lock
        working-directory: producer
        run: |
          python3 - "buildroot/locks/${{ matrix.arch }}.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          try:
              lock = json.loads(path.read_text())
          except (OSError, json.JSONDecodeError) as error:
              raise SystemExit(f"{path}: invalid source lock: {error}")

          if not isinstance(lock, dict) or not lock:
              raise SystemExit(
                  f"{path}: source lock must be a non-empty JSON object; "
                  "run Update Buildroot source locks, review its artifact, and commit it before releasing"
              )
          PY

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Materialize versioned release artifact
        working-directory: producer
        run: |
          nix build .#rootfs-${{ matrix.arch }}
          cp "result/rootfs-${{ matrix.arch }}.tar.zst" \
            "rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst"

      - name: Compute artifact hash
        id: artifact
        working-directory: producer
        run: |
          artifact_hash="$(../scripts/compute-artifact-hash.sh \
            "rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst")"
          printf 'sha256=%s\n' "${artifact_hash}" >> "$GITHUB_OUTPUT"

      - name: Generate cargo-scarlet manifest fragment
        working-directory: producer
        run: |
          cat > "manifest-${{ matrix.arch }}.toml" <<EOF
          [[layers]]
          kind = "archive"
          url = "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst"
          sha256 = "${{ steps.artifact.outputs.sha256 }}"
          format = "tar-zst"
          strip_components = 1
          to = "/system/linux-${{ matrix.arch }}"
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            producer/rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst
            producer/manifest-${{ matrix.arch }}.toml

  release:
    name: Create draft release
    needs: build
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: true
          generate_release_notes: true
          files: release-assets/**

name: Build release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string
      architectures:
        description: Comma-separated architectures to build
        required: true
        default: 'riscv64,aarch64'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: Build rootfs (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(format('["{0}"]', replace(github.event.inputs.architectures, ',', '","'))) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bootstrap the fixed-output hash
        working-directory: producer
        run: ../scripts/bootstrap-hash.sh ./ rootfs-${{ matrix.arch }}

      - name: Materialize versioned release artifact
        working-directory: producer
        run: |
          nix build .#rootfs-${{ matrix.arch }}
          cp "result/rootfs-${{ matrix.arch }}.tar.zst" \
            "rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst"

      - name: Compute artifact hash
        id: artifact
        working-directory: producer
        run: |
          artifact_hash="$(../scripts/compute-artifact-hash.sh \
            "rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst")"
          printf 'sha256=%s\n' "${artifact_hash}" >> "$GITHUB_OUTPUT"

      - name: Generate cargo-scarlet manifest fragment
        working-directory: producer
        run: |
          cat > "manifest-${{ matrix.arch }}.toml" <<EOF
          [[layers]]
          kind = "archive"
          url = "https://github.com/${{ github.repository }}/releases/download/${{ inputs.version }}/rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst"
          sha256 = "${{ steps.artifact.outputs.sha256 }}"
          format = "tar-zst"
          strip_components = 1
          to = "/system/linux-${{ matrix.arch }}"
          EOF

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.arch }}
          if-no-files-found: error
          path: |
            producer/rootfs-${{ matrix.arch }}-${{ inputs.version }}.tar.zst
            producer/manifest-${{ matrix.arch }}.toml

      - name: Open fixed-output hash pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: producer/flake.nix
          branch: release/pin-rootfs-${{ matrix.arch }}-hash
          commit-message: "chore: pin rootfs-${{ matrix.arch }} fixed-output hash"
          title: "Pin rootfs-${{ matrix.arch }} fixed-output hash"
          body: |
            The release build for `${{ inputs.version }}` discovered this
            fixed-output hash while building `rootfs-${{ matrix.arch }}`.
          delete-branch: true

  release:
    name: Create draft release
    needs: build
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          draft: true
          generate_release_notes: true
          files: release-assets/**
